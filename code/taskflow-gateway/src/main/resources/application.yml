server:
  port: ${SERVER_PORT:8080}

jwt:
  access-token:
    secret-key: ${JWT_ACCESS_SECRET:dGFza2Zsb3dfYWNjZXNzX3Rva2VuX3NlY3JldF9rZXlfZGV2X29ubHk=}

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns:
              - "http://localhost:*"
              - "http://127.0.0.1:*"
            allowed-methods: "*"
            allowed-headers: "*"
            exposed-headers:
              - "Content-Disposition"
              - "X-Trace-Id"
            allow-credentials: true
            max-age: 3600
      routes:
        # Auth (PUBLIC) — JWT filter đã whitelist các path register/login/refresh/forgot/reset
        - id: user-auth
          uri: lb://taskflow-user
          predicates:
            - Path=/api/v1/auth/**

        # User Service
        - id: user-service
          uri: lb://taskflow-user
          predicates:
            - Path=/api/v1/users/**

        # Project Service
        - id: project-service
          uri: lb://taskflow-project
          predicates:
            - Path=/api/v1/projects/**,/api/v1/boards/**,/api/v1/lists/**,/api/v1/sprints/**

        # Comment + Attachment dưới /tasks/{id}/...  ưu tiên TRƯỚC task-service
        - id: collab-task-nested
          uri: lb://taskflow-collab
          predicates:
            - Path=/api/v1/tasks/*/comments/**,/api/v1/tasks/*/attachments/**

        # Task Service
        - id: task-service
          uri: lb://taskflow-task
          predicates:
            - Path=/api/v1/tasks/**,/api/v1/checklists/**,/api/v1/checklist-items/**,/api/v1/labels/**

        # Collaboration Service: Comment + Attachment + Activity Log
        - id: collab-service
          uri: lb://taskflow-collab
          predicates:
            - Path=/api/v1/comments/**,/api/v1/attachments/**,/api/v1/activities/**

        # Notification Service
        - id: notification-service
          uri: lb://taskflow-notification
          predicates:
            - Path=/api/v1/notifications/**

        # WebSocket
        - id: notification-ws
          uri: lb:ws://taskflow-notification
          predicates:
            - Path=/ws/**

        # Block /internal/** từ ngoài
        - id: block-internal
          uri: forward:/_blocked
          predicates:
            - Path=/api/v1/internal/**,/internal/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

logging:
  level:
    org.springframework.cloud.gateway: INFO
